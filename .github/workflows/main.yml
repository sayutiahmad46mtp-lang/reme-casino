name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Unzip project
        run: unzip reme-casino.zip

      - name: List all files after unzip
        run: ls -la

      - name: Locate gradlew and set permissions
        run: |
          if [ -f "./gradlew" ]; then
            chmod +x ./gradlew
            echo "PROJECT_DIR=." >> $GITHUB_ENV
          elif [ -f "./reme-casino/gradlew" ]; then
            chmod +x ./reme-casino/gradlew
            echo "PROJECT_DIR=./reme-casino" >> $GITHUB_ENV
          else
            echo "Gradle wrapper not found!"
            exit 1
          fi

      - name: Build APK
        working-directory: ${{ env.PROJECT_DIR }}
        run: ./gradlew assembleRelease --warning-mode none

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: reme-casino-apk
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/release/*.apk
