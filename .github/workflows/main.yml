
name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Unzip project
        run: unzip reme-casino.zip

      - name: List files after unzip
        run: ls -la

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create gradlew if not exists
        run: |
          if [ ! -f "./gradlew" ] && [ ! -f "./reme-casino/gradlew" ]; then
            echo "Gradle wrapper not found, creating it..."
            gradle wrapper --gradle-version 8.6
          fi

      - name: Locate project directory
        run: |
          if [ -f "./gradlew" ]; then
            echo "PROJECT_DIR=." >> $GITHUB_ENV
          elif [ -f "./reme-casino/gradlew" ]; then
            echo "PROJECT_DIR=./reme-casino" >> $GITHUB_ENV
          else
            echo "PROJECT_DIR=." >> $GITHUB_ENV
          fi

      - name: Grant permission
        run: chmod +x ${{ env.PROJECT_DIR }}/gradlew

      - name: Build APK
        working-directory: ${{ env.PROJECT_DIR }}
        run: ./gradlew assembleRelease --warning-mode none

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: reme-casino-apk
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/release/*.apk
