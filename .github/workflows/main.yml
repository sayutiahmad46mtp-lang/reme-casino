name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Unzip project
        run: unzip reme-casino.zip

      - name: 🔍 Tampilkan semua file (debug)
        run: |
          echo "=== Daftar file setelah unzip ==="
          ls -la
          echo "=== Struktur folder (kedalaman 2) ==="
          find . -maxdepth 2 -type d | sort

      - name: 🔍 Cari file build.gradle
        id: find-gradle
        run: |
          BUILD_FILE=$(find . -name "build.gradle" -type f | head -1)
          if [ -n "$BUILD_FILE" ]; then
            PROJECT_DIR=$(dirname "$BUILD_FILE")
            echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
            echo "✅ Ditemukan build.gradle di: $PROJECT_DIR"
          else
            echo "❌ Tidak ada build.gradle! Pastikan ZIP berisi project Android."
            exit 1
          fi

      - name: 📁 Pindah ke direktori proyek
        run: cd ${{ env.PROJECT_DIR }}

      - name: 🛠 Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: 🏗 Buat gradlew jika belum ada
        run: |
          if [ ! -f "${{ env.PROJECT_DIR }}/gradlew" ]; then
            echo "gradlew tidak ditemukan, membuatnya..."
            cd ${{ env.PROJECT_DIR }}
            gradle wrapper --gradle-version 8.6
          fi

      - name: 🔓 Beri izin gradlew
        run: chmod +x ${{ env.PROJECT_DIR }}/gradlew

      - name: 🚀 Build APK
        working-directory: ${{ env.PROJECT_DIR }}
        run: ./gradlew assembleRelease --warning-mode none

      - name: 📦 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: reme-casino-apk
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/release/*.apk
