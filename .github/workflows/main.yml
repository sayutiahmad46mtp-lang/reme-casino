name: Build REME Casino APK v3

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create project structure
        run: |
          mkdir -p app/src/main/java/com/reme/casino
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi
          mkdir -p gradle/wrapper

      - name: Decode and write HTML game
        run: |
          cat << 'HTMLEOF' | base64 -d > app/src/main/assets/index.html

HTMLEOF
          echo "HTML written:  bytes"

      - name: Write MainActivity.java
        run: |
          cat > app/src/main/java/com/reme/casino/MainActivity.java << 'JAVA'
          package com.reme.casino;
          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.WebView;
          import android.webkit.WebSettings;
          import android.view.Window;
          import android.view.WindowManager;
          import android.webkit.WebViewClient;
          import android.webkit.CookieManager;
          public class MainActivity extends Activity {
              private WebView webView;
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  requestWindowFeature(Window.FEATURE_NO_TITLE);
                  getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN,
                      WindowManager.LayoutParams.FLAG_FULLSCREEN);
                  webView = new WebView(this);
                  setContentView(webView);
                  WebSettings s = webView.getSettings();
                  s.setJavaScriptEnabled(true);
                  s.setDomStorageEnabled(true);
                  s.setAllowFileAccess(true);
                  s.setLoadWithOverviewMode(true);
                  s.setUseWideViewPort(true);
                  s.setSupportZoom(false);
                  s.setBuiltInZoomControls(false);
                  CookieManager.getInstance().setAcceptCookie(true);
                  CookieManager.getInstance().setAcceptThirdPartyCookies(webView, true);
                  webView.setWebViewClient(new WebViewClient());
                  webView.loadUrl("file:///android_asset/index.html");
              }
              @Override
              public void onBackPressed() {
                  if (webView.canGoBack()) webView.goBack();
                  else super.onBackPressed();
              }
          }
          JAVA

      - name: Write AndroidManifest.xml
        run: |
          cat > app/src/main/AndroidManifest.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.reme.casino">
              <uses-permission android:name="android.permission.INTERNET"/>
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:theme="@style/AppTheme">
                  <activity android:name=".MainActivity" android:exported="true"
                      android:configChanges="orientation|screenSize|keyboardHidden"
                      android:screenOrientation="portrait">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          XML

      - name: Write resources
        run: |
          echo '<?xml version="1.0" encoding="utf-8"?><resources><string name="app_name">Reme Casino</string></resources>' > app/src/main/res/values/strings.xml
          cat > app/src/main/res/values/styles.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <style name="AppTheme" parent="android:Theme.NoTitleBar.Fullscreen">
              <item name="android:windowBackground">@android:color/black</item>
            </style>
          </resources>
          XML

      - name: Generate icons
        run: |
          python3 << 'PY'
          from PIL import Image, ImageDraw, ImageFont
          sizes = {"hdpi":72,"mdpi":48,"xhdpi":96,"xxhdpi":144,"xxxhdpi":192}
          for name, size in sizes.items():
              img = Image.new("RGBA",(size,size),(0,0,0,0))
              d = ImageDraw.Draw(img)
              d.ellipse([0,0,size-1,size-1],fill=(10,9,20,255))
              r=max(2,size//20)
              d.ellipse([r,r,size-r-1,size-r-1],outline=(255,215,0,255),width=max(2,size//16))
              fs=size//2
              try: font=ImageFont.truetype("/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf",fs)
              except: font=ImageFont.load_default()
              bb=d.textbbox((0,0),"R",font=font)
              x=(size-(bb[2]-bb[0]))//2-bb[0]; y=(size-(bb[3]-bb[1]))//2-bb[1]
              d.text((x,y),"R",fill=(255,215,0,255),font=font)
              img.save(f"app/src/main/res/mipmap-{name}/ic_launcher.png")
              print(f"Icon {name} {size}px done")
          PY

      - name: Write Gradle files
        run: |
          cat > app/build.gradle << 'GRADLE'
          apply plugin: 'com.android.application'
          android {
              compileSdkVersion 33
              defaultConfig {
                  applicationId "com.reme.casino"
                  minSdkVersion 21
                  targetSdkVersion 33
                  versionCode 3
                  versionName "3.0"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      signingConfig signingConfigs.debug
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
          }
          GRADLE

          cat > build.gradle << 'GRADLE'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:7.4.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          GRADLE

          echo "include ':app'" > settings.gradle

          cat > gradle.properties << 'PROPS'
          android.useAndroidX=false
          android.enableJetifier=false
          org.gradle.jvmargs=-Xmx2048m
          PROPS

      - name: Setup Gradle wrapper
        run: |
          cat > gradle/wrapper/gradle-wrapper.properties << 'PROPS'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-7.5-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          PROPS
          curl -sL https://services.gradle.org/distributions/gradle-7.5-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle_dist
          cat > gradlew << 'SH'
          #!/bin/sh
          exec /tmp/gradle_dist/gradle-7.5/bin/gradle ""
          SH
          chmod +x gradlew

      - name: Build APK
        run: |
          export ANDROID_HOME=
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v3
        with:
          name: the-last-game-apk
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
