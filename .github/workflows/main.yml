name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Unzip project
        run: unzip reme-casino.zip

      - name: Build APK
        working-directory: reme-casino
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --warning-mode none

      - uses: actions/upload-artifact@v4
        with:
          name: reme-casino-apk
          path: reme-casino/app/build/outputs/apk/release/*.apk
