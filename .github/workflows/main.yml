name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create project structure
        run: |
          mkdir -p app/src/main/java/com/reme/casino
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/res/values
          for d in hdpi mdpi xhdpi xxhdpi xxxhdpi; do mkdir -p app/src/main/res/mipmap-$d; done
          mkdir -p gradle/wrapper

      - name: Write source files
        run: |
          echo ''  | base64 -d > app/src/main/java/com/reme/casino/MainActivity.java
          echo ''   | base64 -d > app/src/main/AndroidManifest.xml
          echo '' | base64 -d > app/build.gradle
          echo 'YnVpbGRzY3JpcHQgewogICAgcmVwb3NpdG9yaWVzIHsgZ29vZ2xlKCk7IG1hdmVuQ2VudHJhbCgpIH0KICAgIGRlcGVuZGVuY2llcyB7IGNsYXNzcGF0aCAnY29tLmFuZHJvaWQudG9vbHMuYnVpbGQ6Z3JhZGxlOjguMS4wJyB9Cn0KYWxscHJvamVjdHMgeyByZXBvc2l0b3JpZXMgeyBnb29nbGUoKTsgbWF2ZW5DZW50cmFsKCkgfSB9'| base64 -d > build.gradle
          echo 'cm9vdFByb2plY3QubmFtZSA9ICJSZW1lQ2FzaW5vIgppbmNsdWRlICc6YXBwJw=='   | base64 -d > settings.gradle
          echo 'YW5kcm9pZC51c2VBbmRyb2lkWD10cnVlCmFuZHJvaWQuZW5hYmxlSmV0aWZpZXI9dHJ1ZQpvcmcuZ3JhZGxlLmp2bWFyZ3M9LVhteDIwNDht'      | base64 -d > gradle.properties
          echo 'PD94bWwgdmVyc2lvbj0iMS4wIiBlbmNvZGluZz0idXRmLTgiPz48cmVzb3VyY2VzPjxzdHJpbmcgbmFtZT0iYXBwX25hbWUiPlJlbWUgQ2FzaW5vPC9zdHJpbmc+PC9yZXNvdXJjZXM+'    | base64 -d > app/src/main/res/values/strings.xml
          echo ''     | base64 -d > app/src/main/res/values/styles.xml
          echo 'ZGlzdHJpYnV0aW9uQmFzZT1HUkFETEVfVVNFUl9IT01FCmRpc3RyaWJ1dGlvblBhdGg9d3JhcHBlci9kaXN0cwpkaXN0cmlidXRpb25Vcmw9aHR0cHNcOi8vc2VydmljZXMuZ3JhZGxlLm9yZy9kaXN0cmlidXRpb25zL2dyYWRsZS04LjEuMS1iaW4uemlwCnppcFN0b3JlQmFzZT1HUkFETEVfVVNFUl9IT01FCnppcFN0b3JlUGF0aD13cmFwcGVyL2Rpc3Rz'    | base64 -d > gradle/wrapper/gradle-wrapper.properties

      - name: Write HTML game file
        run: |
          echo '' | base64 -d > app/src/main/assets/index.html
          echo "HTML size: $(wc -c < app/src/main/assets/index.html) bytes"

      - name: Generate icons
        run: |
          python3 << 'PYEOF'
          import struct, zlib
          def png(w,h):
              def ck(n,d):
                  return struct.pack('>I',len(d))+n+d+struct.pack('>I',zlib.crc32(n+d)&0xffffffff)
              rows=b''
              for y in range(h):
                  row=b'\x00'
                  for x in range(w):
                      cx,cy=x-w//2,y-h//2
                      row+=bytes([0xc0,0x39,0x2b]) if cx*cx+cy*cy<(min(w,h)//3)**2 else b'\x0a\x0a\x0a'
                  rows+=row
              return b'\x89PNG\r\n\x1a\n'+ck(b'IHDR',struct.pack('>IIBBBBB',w,h,8,2,0,0,0))+ck(b'IDAT',zlib.compress(rows))+ck(b'IEND',b'')
          for d,s in [('hdpi',72),('mdpi',48),('xhdpi',96),('xxhdpi',144),('xxxhdpi',192)]:
              open(f'app/src/main/res/mipmap-{d}/ic_launcher.png','wb').write(png(s,s))
          PYEOF

      - name: Install Gradle wrapper
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.1.1-bin.zip -O /tmp/g.zip
          unzip -q /tmp/g.zip -d /tmp/
          /tmp/gradle-8.1.1/bin/gradle wrapper --gradle-version 8.1.1 --project-dir . 2>/dev/null || true
          chmod +x gradlew
          echo "gradlew OK"

      - name: Build APK
        run: ./gradlew assembleRelease --warning-mode none

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: reme-casino-apk
          path: app/build/outputs/apk/release/*.apk
