name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Unzip project
        run: unzip reme-casino.zip

      - name: List files after unzip
        run: ls -la reme-casino

      - name: Grant execute permission for gradlew
        run: chmod +x reme-casino/gradlew

      - name: Build APK
        working-directory: reme-casino
        run: ./gradlew assembleRelease --warning-mode none

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: reme-casino-apk
          path: reme-casino/app/build/outputs/apk/release/*.apk
